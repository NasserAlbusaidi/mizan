name: Bug report
description: Report a Mizan setup, parsing, dashboard, or packaging problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make Mizan better. Please redact local paths, client names, project names, and raw transcript content.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: The exact command you ran.
      placeholder: mizan --doctor
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics
      description: Run `mizan --support-bundle --output mizan-support.md`. Paste the relevant redacted sections from `mizan-support.md`.
      placeholder: |
        mizan --support-bundle --output mizan-support.md

        Paste the relevant redacted sections from `mizan-support.md` here.
    validations:
      required: true
  - type: textarea
    id: report
    attributes:
      label: Redacted report output
      description: If spend, budget, or leak behavior is involved, paste redacted `mizan --report --window 7` output.
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include raw transcript lines, API keys, auth tokens, client names, or private project names.
          required: true
